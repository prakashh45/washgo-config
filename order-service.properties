# ===============================
# Application
# ===============================
spring.application.name=ORDER-SERVICE

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ===============================
# Server
# ===============================
server.port=8083

# Service URLs (update to lb:// when using LoadBalancer/OpenFeign)
logistics.base-url=lb://LOGISTICS-SERVICE
notification.service.url=lb://NOTIFICATION-SERVICE

# ===============================
# Database
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/washgo_order_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# Jackson
# ===============================
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Asia/Kolkata

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# Logging
# ===============================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===============================
# Swagger
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always