# ===============================
# Application
# ===============================
spring.application.name=ORDER-SERVICE

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ===============================
# Server
# ===============================
server.port=8083

# Service URLs (update to lb:// when using LoadBalancer/OpenFeign)
logistics.base-url=lb://LOGISTICS-SERVICE
notification.service.url=lb://NOTIFICATION-SERVICE

# ===============================
# Database
# ===============================
spring.datasource.url=jdbc:postgresql://postgres:5432/washgo_order_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# Jackson
# ===============================
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Asia/Kolkata

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# Logging
# ===============================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===============================
# Swagger
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


resilience4j.circuitbreaker.instances.logisticsService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.logisticsService.sliding-window-size=5
resilience4j.circuitbreaker.instances.logisticsService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.logisticsService.permitted-number-of-calls-in-half-open-state=2
resilience4j.timelimiter.instances.logisticsService.timeout-duration=3s
resilience4j.timelimiter.instances.logisticsService.cancel-running-future=true  


# =====================================================
# KAFKA
# =====================================================

spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.properties.spring.json.add.type.headers=false