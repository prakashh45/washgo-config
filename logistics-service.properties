# ===============================
# Application
# ===============================
spring.application.name=LOGISTICS-SERVICE

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ===============================
# Server
# ===============================
server.port=8084

# ===============================
# PostgreSQL
# ===============================
spring.datasource.url=jdbc:postgresql://postgres:5432/washgo_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Optional with Hibernate 6 (can be removed)

# ===============================
# Swagger
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG


# Kafka
spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=logistics-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=com.washgo.common.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.washgo.common.event.OrderCreatedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=falsealue.default.type=com.washgo.common.event.OrderCreatedEvent  