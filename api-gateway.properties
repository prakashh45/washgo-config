# ======================================
# APPLICATION
# ======================================

spring.application.name=API-GATEWAY

# ======================================
# Eureka
# ======================================

eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ======================================
# Logging
# ======================================

logging.level.org.springframework.cloud.gateway=DEBUG

# ======================================
# Gateway Routes
# ======================================

# Auth Service
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**

# Catalog Service
spring.cloud.gateway.server.webflux.routes[1].id=catalog-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://CATALOG-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/catalog/**

# Order Service
spring.cloud.gateway.server.webflux.routes[2].id=order-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/orders/**

# Logistics Service
spring.cloud.gateway.server.webflux.routes[3].id=logistics-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://LOGISTICS-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/logistics/**

# Payment Service
spring.cloud.gateway.server.webflux.routes[4].id=payment-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/payments/**

# Razorpay APIs
spring.cloud.gateway.server.webflux.routes[5].id=razorpay-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/v1/razorpay/**

# Notification Service
spring.cloud.gateway.server.webflux.routes[6].id=notification-service
spring.cloud.gateway.server.webflux.routes[6].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/v1/notifications/**